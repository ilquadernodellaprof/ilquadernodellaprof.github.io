---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
  </header>
  <div class="post-content">
    <div class="page-controls">
      <button class="btn-stampa" onclick="window.print()">🖨 Stampa</button>
      <button class="font-btn" onclick="cambiaFont(-1)" aria-label="Rimpicciolisci testo">A−</button>
      <button class="font-btn" onclick="cambiaFont(1)" aria-label="Ingrandisci testo">A+</button>
      <button class="btn-dyslexic" onclick="toggleDyslexic()">Spazioso</button>
      <button class="btn-studio" id="btn-studio">Apri modalità studio 📖</button>
    </div>
<script>
  if (localStorage.getItem('dyslexic') === '1') {
    document.body.classList.add('dyslexic');
    document.querySelector('.btn-dyslexic').textContent = 'Ristretto';
  }
  let dimensione = parseFloat(localStorage.getItem('fontSize')) || 18;
  document.body.style.fontSize = dimensione + 'px';
  function cambiaFont(delta) {
    dimensione = Math.min(Math.max(dimensione + delta * 2, 14), 28);
    document.body.style.fontSize = dimensione + 'px';
    localStorage.setItem('fontSize', dimensione);
  }
  function toggleDyslexic() {
    const attivo = document.body.classList.toggle('dyslexic');
    localStorage.setItem('dyslexic', attivo ? '1' : '0');
    document.querySelector('.btn-dyslexic').textContent = attivo ? 'Ristretto' : 'Spazioso';
  }
</script>

    {{ content }}
    <a href="javascript:history.back()" class="btn-torna">← Torna indietro</a>
  </div>
</article>

<!-- ── Overlay modalità studio ── -->
<div id="book-overlay" aria-hidden="true">

  <div id="book-header">
    <span id="header-title">{{ page.title | escape }}</span><span id="header-section"></span>
  </div>

  <div id="stage">
    <div id="track"></div>
  </div>

  <div id="bar">
    <button class="book-nav" id="prev">&#8592;</button>
    <div id="bar-center">
      <span id="counter"></span>
      <div id="dots"></div>
    </div>
    <button class="book-nav" id="next">&#8594;</button>
    <button id="btn-chiudi">
      <span class="chiudi-x">✕</span>
      <span class="chiudi-label">chiudi</span>
    </button>
  </div>

</div>

<script>
(function() {

  var MAX_DOTS  = 5;
  var THRESHOLD = 60;

  var pages        = [];
  var pageHeadings = [];
  var current      = 0;
  var dragStartX   = null;
  var dragging     = false;

  var overlay       = document.getElementById('book-overlay');
  var track         = document.getElementById('track');
  var stage         = document.getElementById('stage');
  var counter       = document.getElementById('counter');
  var dotsEl        = document.getElementById('dots');
  var prevBtn       = document.getElementById('prev');
  var nextBtn       = document.getElementById('next');
  var btnChiudi     = document.getElementById('btn-chiudi');
  var headerSection = document.getElementById('header-section');

  // ── Fullscreen ────────────────────────────────────────────────────────────
  function enterFullscreen() {
    var el = document.documentElement;
    if (el.requestFullscreen)            el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  }
  function exitFullscreen() {
    if (document.exitFullscreen)            document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }

  // ── Parole che non possono stare a fine pagina ────────────────────────────
  var NO_EOL = ['il','lo','la','i','gli','le',"l'",'un',"un'",'una',
                'dei','delle','degli','dello','di','a','da','in','con',
                'su','per','tra','fra','ai','al','allo','alla','alle',
                'agli','dallo','dalla','dagli','dalle','dai','nel','nello',
                'nella','negli','nelle','nei','sul','sulla','e','che','si'];

  function isNoEol(word) {
    return NO_EOL.indexOf(word.toLowerCase().replace(/[.,;!?]$/, '')) !== -1;
  }

  // ── Paginazione ───────────────────────────────────────────────────────────
  // Lavora su nodi DOM clonati — preserva markup interno (corsivi, link, ecc.)
  // Spezza i paragrafi troppo lunghi frase per frase usando Range.
  function paginate() {

    // Clona il contenuto e rimuove i controlli
    var source = document.querySelector('.post-content').cloneNode(true);
    source.querySelectorAll('.page-controls, script, .btn-torna').forEach(function(el) {
      el.remove();
    });

    // Converte box e details in separatori orizzontali + contenuto piatto
    var BOX_MAP = [
      { selector: '.box-nota', hrClass: 'box-nota-hr' },
      { selector: '.box-info', hrClass: 'box-info-hr' },
      { selector: 'details',   hrClass: 'details-hr'  }
    ];
    BOX_MAP.forEach(function(entry) {
      source.querySelectorAll(entry.selector).forEach(function(box) {
        var frag     = document.createDocumentFragment();
        var hrBefore = document.createElement('hr'); hrBefore.className = entry.hrClass;
        var hrAfter  = document.createElement('hr'); hrAfter.className  = entry.hrClass;
        frag.appendChild(hrBefore);
        if (entry.selector === 'details') {
          Array.from(box.childNodes)
            .filter(function(n) { return n.nodeName !== 'SUMMARY'; })
            .forEach(function(n) { frag.appendChild(n.cloneNode(true)); });
        } else {
          Array.from(box.childNodes).forEach(function(n) {
            frag.appendChild(n.cloneNode(true));
          });
        }
        frag.appendChild(hrAfter);
        box.parentNode.replaceChild(frag, box);
      });
    });

    // Raccoglie solo nodi elemento (scarta nodi di testo spuri tra i tag)
    var nodes = Array.from(source.childNodes).filter(function(n) {
      return n.nodeType === 1;
    });

    // Crea la pagina misuratore nel track
    var probe = document.createElement('div');
    probe.className = 'book-page';
    probe.style.position = 'absolute';
    probe.style.visibility = 'hidden';
    track.appendChild(probe);

    // L'altezza disponibile è quella interna al probe (padding già sottratto)
    var pageH = probe.clientHeight;

    var pages  = [];
    var curDiv = document.createElement('div'); // raccoglie i nodi della pagina corrente

    function fits(testDiv) {
      probe.innerHTML = '';
      probe.appendChild(testDiv.cloneNode(true));
      return probe.scrollHeight <= pageH;
    }

    function flushPage() {
      if (curDiv.childNodes.length > 0) {
        pages.push(curDiv.innerHTML);
        curDiv = document.createElement('div');
      }
    }

    nodes.forEach(function(node) {

      // Prova ad aggiungere il nodo intero
      var testDiv = curDiv.cloneNode(true);
      testDiv.appendChild(node.cloneNode(true));

      if (fits(testDiv)) {
        curDiv.appendChild(node.cloneNode(true));
        return;
      }

      // Non ci sta intero: se non è un paragrafo, vai a pagina nuova
      if (node.nodeName !== 'P') {
        flushPage();
        curDiv.appendChild(node.cloneNode(true));
        return;
      }

      // È un paragrafo: spezza parola per parola preservando il markup
      // Usa i Text node leaves del paragrafo per non perdere corsivi ecc.
      // Strategia: costruisce il paragrafo aggiungendo parole al testo
      // dei nodi foglia, misurando ogni volta.

      var words       = node.textContent.split(' ').filter(function(w) { return w !== ''; });
      var wi          = 0;

      while (wi < words.length) {

        var fitIndex = -1;

        // Cerca quante parole entrano nella pagina corrente
        for (var i = wi; i < words.length; i++) {
          var testP   = document.createElement('p');
          testP.textContent = words.slice(wi, i + 1).join(' ');
          // Copia gli attributi del nodo originale
          Array.from(node.attributes).forEach(function(a) {
            testP.setAttribute(a.name, a.value);
          });
          var t2 = curDiv.cloneNode(true);
          t2.appendChild(testP);
          probe.innerHTML = '';
          probe.appendChild(t2);
          if (probe.scrollHeight <= pageH) { fitIndex = i; }
          else break;
        }

        // Nessuna parola entra: pagina nuova e riprova
        if (fitIndex === -1) {
          flushPage();
          continue;
        }

        // Tutte le parole rimanenti entrano
        if (fitIndex === words.length - 1) {
          var finalP = document.createElement('p');
          finalP.textContent = words.slice(wi).join(' ');
          Array.from(node.attributes).forEach(function(a) {
            finalP.setAttribute(a.name, a.value);
          });
          curDiv.appendChild(finalP);
          wi = words.length;
          continue;
        }

        // Taglio parziale: applica regola NO_EOL
        var splitAt = fitIndex;
        if (isNoEol(words[splitAt])) {
          splitAt = Math.max(wi, splitAt - 1);
        }

        // Taglio parziale: applica regola punteggiatura forte/debole
        // (preferisce tagliare dopo . ! ? ; ,)
        var STRONG = /[.!?]$/;
        var WEAK   = /[;,]$/;
        var bestBreak = -1;
        for (var j = splitAt; j >= wi; j--) {
          if (STRONG.test(words[j])) { bestBreak = j; break; }
        }
        if (bestBreak === -1) {
          for (var j = splitAt; j >= wi; j--) {
            if (WEAK.test(words[j])) { bestBreak = j; break; }
          }
        }
        if (bestBreak !== -1) splitAt = bestBreak;

        var partP = document.createElement('p');
        partP.textContent = words.slice(wi, splitAt + 1).join(' ');
        Array.from(node.attributes).forEach(function(a) {
          partP.setAttribute(a.name, a.value);
        });
        curDiv.appendChild(partP);
        flushPage();
        wi = splitAt + 1;
      }
    });

    flushPage();
    track.removeChild(probe);
    return pages;
  }

  // ── Carosello ─────────────────────────────────────────────────────────────
  function buildCarousel() {
    track.innerHTML  = '';
    dotsEl.innerHTML = '';
    pages   = paginate();
    current = 0;

    var lastHeading = '';
    pageHeadings = pages.map(function(html) {
      var tmp = document.createElement('div');
      tmp.innerHTML = html;
      var h = tmp.querySelector('h2, h3');
      if (h) lastHeading = h.textContent.trim();
      return lastHeading;
    });

    pages.forEach(function(html) {
      var div = document.createElement('div');
      div.className = 'book-page';
      div.innerHTML = html;
      track.appendChild(div);
    });

    var n = Math.min(pages.length, MAX_DOTS);
    for (var i = 0; i < n; i++) {
      var d = document.createElement('div');
      d.className = 'dot';
      dotsEl.appendChild(d);
    }

    goTo(0, false);
  }

  // ── Navigazione ───────────────────────────────────────────────────────────
  function updateTrack(offset) {
    track.style.transform = 'translateX(calc(-' + current * 100 + '% + ' + offset + 'px))';
  }

  function updateUI() {
    var total = pages.length;
    counter.textContent = (current + 1) + ' / ' + total;

    var sec = pageHeadings[current];
    headerSection.textContent = sec ? ' · ' + sec : '';

    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === total - 1;

    var visibile = Math.min(total, MAX_DOTS);
    var start    = Math.min(Math.max(current - 2, 0), total - visibile);
    Array.from(dotsEl.children).forEach(function(d, i) {
      d.classList.toggle('active', start + i === current);
    });
  }

  function goTo(n, animated) {
    if (animated === undefined) animated = true;
    if (n < 0 || n >= pages.length) return;
    current = n;
    if (!animated) track.classList.add('no-transition');
    updateTrack(0);
    if (!animated) {
      track.getBoundingClientRect();
      track.classList.remove('no-transition');
    }
    updateUI();
  }

  // ── Apri studio ───────────────────────────────────────────────────────────
  function apriStudio() {
    overlay.classList.add('active');
    overlay.setAttribute('aria-hidden', 'false');
    enterFullscreen();

    var rafCount = 0;
    function waitAndBuild() {
      rafCount++;
      if (rafCount < 4) { requestAnimationFrame(waitAndBuild); return; }
      document.fonts.ready.then(function() {
        setTimeout(buildCarousel, 80);
      });
    }
    requestAnimationFrame(waitAndBuild);
  }

  document.getElementById('btn-studio').addEventListener('click', apriStudio);

  btnChiudi.addEventListener('click', function() {
    overlay.classList.remove('active');
    overlay.setAttribute('aria-hidden', 'true');
    exitFullscreen();
  });

  document.addEventListener('keydown', function(e) {
    if (!overlay.classList.contains('active')) return;
    if (e.key === 'ArrowRight') goTo(current + 1);
    if (e.key === 'ArrowLeft')  goTo(current - 1);
  });

  prevBtn.addEventListener('click', function() { goTo(current - 1); });
  nextBtn.addEventListener('click', function() { goTo(current + 1); });

  // Ricalcola al resize (barra indirizzi mobile che appare/sparisce)
  var resizeTimer;
  window.addEventListener('resize', function() {
    if (!overlay.classList.contains('active')) return;
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(buildCarousel, 200);
  });

  // ── Drag / swipe ──────────────────────────────────────────────────────────
  function onDragStart(x) { dragStartX = x; dragging = true; track.classList.add('no-transition'); }
  function onDragMove(x) {
    if (!dragging) return;
    var dx    = x - dragStartX;
    var total = pages.length;
    if ((current === 0 && dx > 0) || (current === total - 1 && dx < 0)) updateTrack(dx * 0.2);
    else updateTrack(dx);
  }
  function onDragEnd(x) {
    if (!dragging) return;
    dragging = false;
    track.classList.remove('no-transition');
    var dx = x - dragStartX;
    if (dx < -THRESHOLD)     goTo(current + 1);
    else if (dx > THRESHOLD) goTo(current - 1);
    else                     goTo(current);
  }

  stage.addEventListener('touchstart', function(e) { onDragStart(e.touches[0].clientX); },       { passive: true });
  stage.addEventListener('touchmove',  function(e) { onDragMove(e.touches[0].clientX); },        { passive: true });
  stage.addEventListener('touchend',   function(e) { onDragEnd(e.changedTouches[0].clientX); });
  stage.addEventListener('mousedown',  function(e) { onDragStart(e.clientX); });
  window.addEventListener('mousemove', function(e) { if (dragging) onDragMove(e.clientX); });
  window.addEventListener('mouseup',   function(e) { if (dragging) onDragEnd(e.clientX); });

})();
</script>
