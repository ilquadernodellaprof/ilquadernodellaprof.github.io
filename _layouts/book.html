---
layout: default
---
<article class="post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
  </header>
  <div class="post-content">
    <div class="page-controls">
      <button class="btn-stampa" onclick="window.print()">🖨 Stampa</button>
      <button class="font-btn" onclick="cambiaFont(-1)" aria-label="Rimpicciolisci testo">A−</button>
      <button class="font-btn" onclick="cambiaFont(1)" aria-label="Ingrandisci testo">A+</button>
      <button class="btn-dyslexic" onclick="toggleDyslexic()">Spazioso</button>
      <button class="btn-studio" id="btn-studio">Apri modalità studio 📖</button>
    </div>
<script>
  if (localStorage.getItem('dyslexic') === '1') {
    document.body.classList.add('dyslexic');
    document.querySelector('.btn-dyslexic').textContent = 'Ristretto';
  }
  let dimensione = parseFloat(localStorage.getItem('fontSize')) || 18;
  document.body.style.fontSize = dimensione + 'px';
  function cambiaFont(delta) {
    dimensione = Math.min(Math.max(dimensione + delta * 2, 14), 28);
    document.body.style.fontSize = dimensione + 'px';
    localStorage.setItem('fontSize', dimensione);
  }
  function toggleDyslexic() {
    const attivo = document.body.classList.toggle('dyslexic');
    localStorage.setItem('dyslexic', attivo ? '1' : '0');
    document.querySelector('.btn-dyslexic').textContent = attivo ? 'Ristretto' : 'Spazioso';
  }
</script>

    {{ content }}
    <a href="javascript:history.back()" class="btn-torna">← Torna indietro</a>
  </div>
</article>

<!-- ── Overlay modalità studio ── -->
<div id="book-overlay" aria-hidden="true">

  <div id="book-header">
    <span id="header-title">{{ page.title | escape }}</span><span id="header-section"></span>
  </div>

  <div id="stage">
    <div id="track"></div>
  </div>

  <div id="bar">
    <button class="book-nav" id="prev">&#8592;</button>
    <div id="bar-center">
      <span id="counter"></span>
      <div id="dots"></div>
    </div>
    <button class="book-nav" id="next">&#8594;</button>
    <button id="btn-chiudi">
      <span class="chiudi-x">✕</span>
      <span class="chiudi-label">chiudi</span>
    </button>
  </div>

</div>

<script>
(function() {

  var MAX_DOTS  = 5;
  var THRESHOLD = 60;

  var pages        = [];
  var pageHeadings = [];
  var current      = 0;
  var dragStartX   = null;
  var dragging     = false;

  var overlay       = document.getElementById('book-overlay');
  var track         = document.getElementById('track');
  var stage         = document.getElementById('stage');
  var counter       = document.getElementById('counter');
  var dotsEl        = document.getElementById('dots');
  var prevBtn       = document.getElementById('prev');
  var nextBtn       = document.getElementById('next');
  var btnChiudi     = document.getElementById('btn-chiudi');
  var headerSection = document.getElementById('header-section');

  // ── Fullscreen ────────────────────────────────────────────────────────────
  function enterFullscreen() {
    var el = document.documentElement;
    if (el.requestFullscreen)            el.requestFullscreen();
    else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
  }
  function exitFullscreen() {
    if (document.exitFullscreen)            document.exitFullscreen();
    else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
  }

  // ── Spezzatura naturale ───────────────────────────────────────────────────
  function findBreakPoint(words, overflowIndex) {
    var STRONG = /[.!?]$/;
    var WEAK   = /[;:,]$/;
    var limit  = Math.max(0, overflowIndex - 15);
    for (var i = overflowIndex - 1; i >= limit; i--) {
      if (STRONG.test(words[i])) return i;
    }
    for (var i = overflowIndex - 1; i >= limit; i--) {
      if (WEAK.test(words[i])) return i;
    }
    return -1;
  }

  // ── Paginazione ───────────────────────────────────────────────────────────
  function paginate() {

    // Prepara il contenuto
    var raw    = document.querySelector('.post-content').innerHTML;
    var parser = new DOMParser();
    var doc    = parser.parseFromString('<div>' + raw + '</div>', 'text/html');
    doc.querySelectorAll('.page-controls, script, .btn-torna').forEach(function(el) { el.remove(); });

    // Converte box in hr colorati + contenuto piatto
    var BOX_MAP = [
      { selector: '.box-nota', hrClass: 'box-nota-hr' },
      { selector: '.box-info', hrClass: 'box-info-hr' },
      { selector: 'details',   hrClass: 'details-hr'  }
    ];
    BOX_MAP.forEach(function(entry) {
      doc.querySelectorAll(entry.selector).forEach(function(box) {
        var frag     = doc.createDocumentFragment();
        var hrBefore = doc.createElement('hr'); hrBefore.className = entry.hrClass;
        var hrAfter  = doc.createElement('hr'); hrAfter.className  = entry.hrClass;
        var inner    = doc.createElement('div');
        if (entry.selector === 'details') {
          Array.from(box.childNodes)
            .filter(function(n) { return n.nodeName !== 'SUMMARY'; })
            .forEach(function(n) { inner.appendChild(n.cloneNode(true)); });
        } else {
          inner.innerHTML = box.innerHTML;
        }
        frag.appendChild(hrBefore);
        Array.from(inner.childNodes).forEach(function(n) { frag.appendChild(n.cloneNode(true)); });
        frag.appendChild(hrAfter);
        box.parentNode.replaceChild(frag, box);
      });
    });

    var nodes = Array.from(doc.body.firstChild.childNodes).filter(function(n) {
      return n.outerHTML || n.textContent.trim();
    });

    // Crea una pagina misuratore reale nel track
    var probe = document.createElement('div');
    probe.className = 'book-page';
    probe.style.position = 'absolute';
    probe.style.visibility = 'hidden';
    track.appendChild(probe);

    // FIX: misura l'altezza disponibile dall'interno del probe,
    // non dallo stage — così il padding di .book-page è già sottratto.
    var pageH = probe.clientHeight;

    var result = [];
    var cur    = '';

    nodes.forEach(function(node) {
      var html = node.outerHTML || node.textContent;

      if (node.nodeName !== 'P') {
        probe.innerHTML = cur + html;
        if (probe.scrollHeight <= pageH) {
          cur += html;
        } else {
          if (cur) result.push(cur);
          cur = html;
        }
        return;
      }

      probe.innerHTML = cur + node.outerHTML;
      if (probe.scrollHeight <= pageH) {
        cur += node.outerHTML;
        return;
      }

      var words = node.textContent.split(' ');
      var wi    = 0;

      while (wi < words.length) {
        var fitIndex = -1;
        var buffer   = '';
        for (var i = wi; i < words.length; i++) {
          var test = buffer + (buffer ? ' ' : '') + words[i];
          probe.innerHTML = cur + '<p>' + test + '</p>';
          if (probe.scrollHeight <= pageH) { buffer = test; fitIndex = i; }
          else break;
        }

        if (fitIndex === -1) {
          if (cur) result.push(cur);
          cur = '<p>' + words[wi] + '</p>';
          wi++;
          continue;
        }
        if (fitIndex === words.length - 1) {
          cur += '<p>' + buffer + '</p>';
          wi = words.length;
          continue;
        }

        var breakAt = findBreakPoint(words, fitIndex + 1);
        var splitAt = breakAt >= 0 ? breakAt : fitIndex;
        cur += '<p>' + words.slice(wi, splitAt + 1).join(' ') + '</p>';
        result.push(cur);
        cur = '';
        wi  = splitAt + 1;
      }
    });

    if (cur) result.push(cur);

    // Rimuove la pagina misuratore
    track.removeChild(probe);
    return result;
  }

  // ── Carosello ─────────────────────────────────────────────────────────────
  function buildCarousel() {
    track.innerHTML  = '';
    dotsEl.innerHTML = '';
    pages   = paginate();
    current = 0;

    var lastHeading = '';
    pageHeadings = pages.map(function(html) {
      var tmp = document.createElement('div');
      tmp.innerHTML = html;
      var h = tmp.querySelector('h2, h3');
      if (h) lastHeading = h.textContent.trim();
      return lastHeading;
    });

    pages.forEach(function(html) {
      var div = document.createElement('div');
      div.className = 'book-page';
      div.innerHTML = html;
      track.appendChild(div);
    });

    var n = Math.min(pages.length, MAX_DOTS);
    for (var i = 0; i < n; i++) {
      var d = document.createElement('div');
      d.className = 'dot';
      dotsEl.appendChild(d);
    }

    goTo(0, false);
  }

  // ── Navigazione ───────────────────────────────────────────────────────────
  function updateTrack(offset) {
    track.style.transform = 'translateX(calc(-' + current * 100 + '% + ' + offset + 'px))';
  }

  function updateUI() {
    var total = pages.length;
    counter.textContent = (current + 1) + ' / ' + total;

    var sec = pageHeadings[current];
    headerSection.textContent = sec ? ' · ' + sec : '';

    prevBtn.disabled = current === 0;
    nextBtn.disabled = current === total - 1;

    var visibile = Math.min(total, MAX_DOTS);
    var start    = Math.min(Math.max(current - 2, 0), total - visibile);
    Array.from(dotsEl.children).forEach(function(d, i) {
      d.classList.toggle('active', start + i === current);
    });
  }

  function goTo(n, animated) {
    if (animated === undefined) animated = true;
    if (n < 0 || n >= pages.length) return;
    current = n;
    if (!animated) track.classList.add('no-transition');
    updateTrack(0);
    if (!animated) {
      track.getBoundingClientRect();
      track.classList.remove('no-transition');
    }
    updateUI();
  }

  // ── Apri studio ───────────────────────────────────────────────────────────
  function apriStudio() {
    overlay.classList.add('active');
    overlay.setAttribute('aria-hidden', 'false');
    enterFullscreen();

    // FIX: aspetta più frame + timeout per Safari iOS
    // dove la viewport si assesta dopo il fullscreen
    var rafCount = 0;
    function waitAndBuild() {
      rafCount++;
      if (rafCount < 4) { requestAnimationFrame(waitAndBuild); return; }
      document.fonts.ready.then(function() {
        setTimeout(buildCarousel, 80);
      });
    }
    requestAnimationFrame(waitAndBuild);
  }

  document.getElementById('btn-studio').addEventListener('click', apriStudio);

  btnChiudi.addEventListener('click', function() {
    overlay.classList.remove('active');
    overlay.setAttribute('aria-hidden', 'true');
    exitFullscreen();
  });

  document.addEventListener('keydown', function(e) {
    if (!overlay.classList.contains('active')) return;
    if (e.key === 'ArrowRight') goTo(current + 1);
    if (e.key === 'ArrowLeft')  goTo(current - 1);
  });

  prevBtn.addEventListener('click', function() { goTo(current - 1); });
  nextBtn.addEventListener('click', function() { goTo(current + 1); });

  // FIX: ricalcola al resize (barra indirizzi mobile che appare/sparisce)
  var resizeTimer;
  window.addEventListener('resize', function() {
    if (!overlay.classList.contains('active')) return;
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(buildCarousel, 200);
  });

  // ── Drag / swipe ──────────────────────────────────────────────────────────
  function onDragStart(x) { dragStartX = x; dragging = true; track.classList.add('no-transition'); }
  function onDragMove(x) {
    if (!dragging) return;
    var dx    = x - dragStartX;
    var total = pages.length;
    if ((current === 0 && dx > 0) || (current === total - 1 && dx < 0)) updateTrack(dx * 0.2);
    else updateTrack(dx);
  }
  function onDragEnd(x) {
    if (!dragging) return;
    dragging = false;
    track.classList.remove('no-transition');
    var dx = x - dragStartX;
    if (dx < -THRESHOLD)     goTo(current + 1);
    else if (dx > THRESHOLD) goTo(current - 1);
    else                     goTo(current);
  }

  stage.addEventListener('touchstart', function(e) { onDragStart(e.touches[0].clientX); },       { passive: true });
  stage.addEventListener('touchmove',  function(e) { onDragMove(e.touches[0].clientX); },        { passive: true });
  stage.addEventListener('touchend',   function(e) { onDragEnd(e.changedTouches[0].clientX); });
  stage.addEventListener('mousedown',  function(e) { onDragStart(e.clientX); });
  window.addEventListener('mousemove', function(e) { if (dragging) onDragMove(e.clientX); });
  window.addEventListener('mouseup',   function(e) { if (dragging) onDragEnd(e.clientX); });

})();
</script>
