<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

<title>Fullscreen Flip Reader</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#111;
    font-family:system-ui,sans-serif;
    touch-action:none;
}

.reader{
    position:relative;
    width:100vw;
    height:100vh;
    perspective:1800px;
    overflow:hidden;
}

.page{
    position:absolute;
    inset:0;
    background:#fff;
    padding:28px 22px;
    transform-origin:left center;
    transition:transform .9s cubic-bezier(.77,0,.18,1);
    backface-visibility:hidden;
    overflow:hidden;
    box-shadow:0 0 30px rgba(0,0,0,.35);
}

.page.flipped{
    transform:rotateY(-180deg);
}

.page-inner{
    width:100%;
    height:100%;
    overflow:hidden;
    line-height:1.65;
    font-size:18px;
    color:#222;
    word-wrap:break-word;
}

.tap-zone{
    position:fixed;
    top:0;
    width:50%;
    height:100%;
    z-index:999;
}

.tap-next{
    right:0;
}

.tap-prev{
    left:0;
}
</style>
</head>
<body>

<div class="reader" id="reader"></div>

<div class="tap-zone tap-prev"></div>
<div class="tap-zone tap-next"></div>

<script>
const text = `
Lorem ipsum dolor sit amet, consectetur adipiscing elit. 
Suspendisse potenti. Vestibulum ante ipsum primis in faucibus orci luctus et ultrices posuere cubilia curae. 
Curabitur vulputate, sapien sed luctus cursus, nisl urna tincidunt neque, eget dapibus lorem risus vel augue. 
Mauris feugiat sem ut odio pretium, a facilisis lacus tristique. 
Vivamus posuere ligula at eros vulputate, vitae faucibus purus pharetra. 
Aliquam erat volutpat. Pellentesque habitant morbi tristique senectus et netus et malesuada fames ac turpis egestas.

Praesent volutpat, eros sed luctus convallis, nisl magna egestas lorem, non tincidunt lacus lorem nec massa. 
Vestibulum feugiat tortor sed ligula luctus, ut efficitur mauris viverra. 
Donec ac augue et neque fermentum aliquam. 
Sed vel tellus in lorem dignissim tincidunt. 
Ut tincidunt lectus eget massa feugiat, quis malesuada sapien luctus.

`.repeat(40);

const reader = document.getElementById('reader');

let pages = [];
let currentPage = 0;

function paginate() {

    reader.innerHTML = '';

    pages = [];

    const words = text.split(' ');
    let currentText = '';

    while(words.length > 0){

        const testPage = document.createElement('div');
        testPage.className = 'page';

        const inner = document.createElement('div');
        inner.className = 'page-inner';

        testPage.appendChild(inner);
        reader.appendChild(testPage);

        while(words.length > 0){

            currentText += words[0] + ' ';
            inner.innerHTML = currentText;

            if(inner.scrollHeight > inner.clientHeight){

                currentText = currentText.replace(words[0] + ' ','');
                break;
            }

            words.shift();
        }

        inner.innerHTML = currentText;

        pages.push(testPage);

        currentText = '';
    }

    pages.forEach((p,i)=>{
        p.style.zIndex = pages.length - i;
    });

    currentPage = 0;
}

function nextPage(){
    if(currentPage >= pages.length) return;

    pages[currentPage].classList.add('flipped');
    currentPage++;
}

function prevPage(){
    if(currentPage <= 0) return;

    currentPage--;
    pages[currentPage].classList.remove('flipped');
}

document.querySelector('.tap-next')
.addEventListener('click', nextPage);

document.querySelector('.tap-prev')
.addEventListener('click', prevPage);

let touchStartX = 0;

document.addEventListener('touchstart', e=>{
    touchStartX = e.changedTouches[0].clientX;
});

document.addEventListener('touchend', e=>{
    const endX = e.changedTouches[0].clientX;
    const diff = touchStartX - endX;

    if(diff > 50) nextPage();
    if(diff < -50) prevPage();
});

window.addEventListener('resize', paginate);

paginate();
</script>

</body>
</html>
